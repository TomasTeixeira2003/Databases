{% extends 'base.html' %}


{% block content %}
<div class="container-update">
  <form class="main-form" method="post" style="display: inline-block;">
  <h1>{% block title %}Editing {{ product['name'] }}{% endblock %}</h1>
  <label for="name">Product</label>
  <input name="name" id="name" type="text" value="{{ request.form['name'] or product['name'] }}" disabled>
  <label for="price">Price</label>
  <input name="price" id="price" type="number" min="0" step="0.01" placeholder="0.00" value="{{ request.form['price'] or product['price'] }}" required>
  <label for="description">Description</label>
  <input name="description" id="description" type="text" placeholder="description" value="{{ request.form['description'] or product['description'] }}" required>
  <div class="button-container">
    
      <input type="submit" value="Save" class="save-btn">
    </form>
  </div>
</div>
{% endblock %}
